name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        default: windows
        type: choice
        options:
          - windows
          - linux
          - all
      package:
        description: "Build installer artifacts"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  windows:
    name: Windows
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'windows' || inputs.platform == 'all' }}
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --loglevel=error --fund=false --audit=false

      - name: Test
        run: npm test

      - name: Package
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.package }}
        run: npm run package:win
        env:
          AI_USAGE_UPDATER_PUBLIC_KEY: ${{ secrets.AI_USAGE_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifact
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.package }}
        uses: actions/upload-artifact@v6
        with:
          name: ai-usage-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
          if-no-files-found: error
          retention-days: 7

      - name: Upload release asset
        if: ${{ startsWith(github.ref, 'refs/tags/') && (github.event_name != 'workflow_dispatch' || inputs.package) }}
        shell: bash
        run: |
          gh release view "${{ github.ref_name }}" \
            || gh release create "${{ github.ref_name }}" --title "AI Usage ${{ github.ref_name }}" --generate-notes \
            || gh release view "${{ github.ref_name }}"
          gh release upload "${{ github.ref_name }}" "src-tauri/target/release/bundle/nsis/"*.exe --clobber
          gh release upload "${{ github.ref_name }}" "src-tauri/target/release/bundle/nsis/"*.sig --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  linux:
    name: Linux
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'linux' || inputs.platform == 'all' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --loglevel=error --fund=false --audit=false

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Test
        run: npm test

      - name: Package
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.package }}
        run: npm run package:linux
        env:
          AI_USAGE_UPDATER_PUBLIC_KEY: ${{ secrets.AI_USAGE_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifact
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.package }}
        uses: actions/upload-artifact@v6
        with:
          name: ai-usage-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.sig
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error
          retention-days: 7

      - name: Upload release assets
        if: ${{ startsWith(github.ref, 'refs/tags/') && (github.event_name != 'workflow_dispatch' || inputs.package) }}
        run: |
          gh release view "${{ github.ref_name }}" \
            || gh release create "${{ github.ref_name }}" --title "AI Usage ${{ github.ref_name }}" --generate-notes \
            || gh release view "${{ github.ref_name }}"
          gh release upload "${{ github.ref_name }}" "src-tauri/target/release/bundle/appimage/"*.AppImage --clobber
          gh release upload "${{ github.ref_name }}" "src-tauri/target/release/bundle/appimage/"*.sig --clobber
          gh release upload "${{ github.ref_name }}" "src-tauri/target/release/bundle/deb/"*.deb --clobber
        env:
          GH_TOKEN: ${{ github.token }}
