name: Build

on:
  push:
    branches:
      - main
      - "codex/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        default: windows
        type: choice
        options:
          - windows
          - linux
          - all
      package:
        description: "Build installer artifacts"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  windows:
    name: Windows
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'windows' || inputs.platform == 'all' }}
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      HAS_UPDATER_SIGNING: ${{ secrets.AI_USAGE_UPDATER_PUBLIC_KEY != '' && secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --loglevel=error --fund=false --audit=false

      - name: Test
        run: npm test

      - name: Format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Lint
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Package signed
        if: ${{ (startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.package)) && env.HAS_UPDATER_SIGNING == 'true' }}
        run: npm run package:win
        env:
          AI_USAGE_UPDATER_PUBLIC_KEY: ${{ secrets.AI_USAGE_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Package unsigned
        if: ${{ (startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.package)) && env.HAS_UPDATER_SIGNING != 'true' }}
        run: npm run package:win:unsigned

      - name: Upload artifact
        if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.package) }}
        uses: actions/upload-artifact@v6
        with:
          name: ai-usage-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
          if-no-files-found: error
          retention-days: 7

  linux:
    name: Linux
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'linux' || inputs.platform == 'all' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HAS_UPDATER_SIGNING: ${{ secrets.AI_USAGE_UPDATER_PUBLIC_KEY != '' && secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --loglevel=error --fund=false --audit=false

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Test
        run: npm test

      - name: Format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Lint
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Package signed
        if: ${{ (startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.package)) && env.HAS_UPDATER_SIGNING == 'true' }}
        run: npm run package:linux
        env:
          AI_USAGE_UPDATER_PUBLIC_KEY: ${{ secrets.AI_USAGE_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Package unsigned
        if: ${{ (startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.package)) && env.HAS_UPDATER_SIGNING != 'true' }}
        run: npm run package:linux:unsigned

      - name: Upload artifact
        if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.package) }}
        uses: actions/upload-artifact@v6
        with:
          name: ai-usage-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.sig
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error
          retention-days: 7

  release:
    name: Release
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs:
      - windows
      - linux
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      HAS_UPDATER_SIGNING: ${{ secrets.AI_USAGE_UPDATER_PUBLIC_KEY != '' && secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-artifacts

      - name: Generate updater manifest
        if: ${{ env.HAS_UPDATER_SIGNING == 'true' }}
        run: node scripts/write-latest-json.js --artifacts release-artifacts --output release-artifacts/latest.json --repo "${{ github.repository }}" --tag "${{ github.ref_name }}"

      - name: Upload release assets
        shell: bash
        run: |
          gh release view "${{ github.ref_name }}" \
            || gh release create "${{ github.ref_name }}" --title "AI Usage ${{ github.ref_name }}" --generate-notes \
            || gh release view "${{ github.ref_name }}"
          mapfile -t assets < <(find release-artifacts -type f \( -name '*.exe' -o -name '*.sig' -o -name '*.AppImage' -o -name '*.deb' -o -name 'latest.json' \))
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi
          gh release upload "${{ github.ref_name }}" "${assets[@]}" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
