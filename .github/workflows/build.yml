name: Build

on:
  push:
    branches:
      - main
      - "codex/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        default: windows
        type: choice
        options:
          - windows
          - linux
          - all
      package:
        description: "Build installer artifacts"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      HAS_UPDATER_SIGNING: ${{ secrets.AI_USAGE_UPDATER_PUBLIC_KEY != '' && secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Check release configuration
        run: npm run release:check
        env:
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}

      - name: Require updater signing for tagged releases
        if: ${{ startsWith(github.ref, 'refs/tags/') && env.HAS_UPDATER_SIGNING != 'true' }}
        run: |
          echo "::error::Tagged releases require AI_USAGE_UPDATER_PUBLIC_KEY and TAURI_SIGNING_PRIVATE_KEY."
          exit 1

  windows:
    name: Windows
    needs: preflight
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'windows' || inputs.platform == 'all' }}
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      HAS_UPDATER_SIGNING: ${{ secrets.AI_USAGE_UPDATER_PUBLIC_KEY != '' && secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --loglevel=error --fund=false --audit=false

      - name: Test
        run: npm test

      - name: Format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Lint
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Package signed
        if: ${{ (startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.package)) && env.HAS_UPDATER_SIGNING == 'true' }}
        run: npm run package:win
        env:
          AI_USAGE_UPDATER_PUBLIC_KEY: ${{ secrets.AI_USAGE_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Package unsigned
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.package && env.HAS_UPDATER_SIGNING != 'true' }}
        run: npm run package:win:unsigned

      - name: Upload artifact
        if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.package) }}
        uses: actions/upload-artifact@v7
        with:
          name: ai-usage-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
          if-no-files-found: error
          retention-days: 1

  linux:
    name: Linux
    needs: preflight
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'linux' || inputs.platform == 'all' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HAS_UPDATER_SIGNING: ${{ secrets.AI_USAGE_UPDATER_PUBLIC_KEY != '' && secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --loglevel=error --fund=false --audit=false

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Test
        run: npm test

      - name: Format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Lint
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Package signed
        if: ${{ (startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.package)) && env.HAS_UPDATER_SIGNING == 'true' }}
        run: npm run package:linux
        env:
          AI_USAGE_UPDATER_PUBLIC_KEY: ${{ secrets.AI_USAGE_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Package unsigned
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.package && env.HAS_UPDATER_SIGNING != 'true' }}
        run: npm run package:linux:unsigned

      - name: Upload artifact
        if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.package) }}
        uses: actions/upload-artifact@v7
        with:
          name: ai-usage-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.sig
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error
          retention-days: 1

  release:
    name: Release
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs:
      - windows
      - linux
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Verify updater signatures
        run: npm run updater:verify-signatures -- --artifacts release-artifacts
        env:
          AI_USAGE_UPDATER_PUBLIC_KEY: ${{ secrets.AI_USAGE_UPDATER_PUBLIC_KEY }}

      - name: Generate updater manifest
        run: node scripts/write-latest-json.js --artifacts release-artifacts --output release-artifacts/latest.json --repo "${{ github.repository }}" --tag "${{ github.ref_name }}"

      - name: Prepare draft release
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release edit "${{ github.ref_name }}" --draft
          else
            gh release create "${{ github.ref_name }}" --draft --verify-tag --title "AI Usage ${{ github.ref_name }}" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload release assets to draft
        shell: bash
        run: |
          mapfile -t assets < <(find release-artifacts -type f \( -name '*.exe' -o -name '*.sig' -o -name '*.AppImage' -o -name '*.deb' -o -name 'latest.json' \))
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi
          gh release upload "${{ github.ref_name }}" "${assets[@]}" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish and verify updater release
        run: |
          gh release edit "${{ github.ref_name }}" --draft=false --latest
          if ! npm run release:verify -- --repo "${{ github.repository }}" --tag "${{ github.ref_name }}"; then
            echo "::error::Published updater verification failed; returning the release to draft."
            gh release edit "${{ github.ref_name }}" --draft
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}
