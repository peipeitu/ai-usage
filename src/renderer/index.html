<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Usage</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-drag-region" data-tauri-drag-region aria-hidden="true"></div>
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <img src="./assets/app-icon.svg" alt="" />
          </div>
          <div>
            <strong>AI Usage</strong>
            <span id="brandSubtitle">Usage monitor</span>
          </div>
        </div>

        <nav id="primaryNav" class="sidebar-nav" aria-label="Primary navigation">
          <button id="homeButton" class="nav-button primary active" type="button">概览</button>
          <button id="settingsButton" class="nav-button" type="button">设置</button>
        </nav>

        <section id="sidebarProviderSection" class="sidebar-provider" aria-label="AI 服务">
          <span id="sidebarProviderLabel">AI 服务</span>
          <div id="providerOptions" class="provider-options compact" role="radiogroup" aria-label="AI 服务">
            <button class="provider-option active" type="button" data-provider="codex" aria-checked="true">
              <span>Codex</span>
            </button>
            <button class="provider-option" type="button" data-provider="claude" aria-checked="false">
              <span>Claude Code</span>
            </button>
          </div>
        </section>

        <section id="sidebarUsageSection" class="sidebar-usage" aria-label="Period usage">
          <span id="sidebarUsageLabel">剩余用量</span>
          <strong id="sidebarRemainingUsage">-</strong>
          <small id="sidebarPeriodMeta">近 30 天</small>
        </section>

        <section class="account-pill" aria-label="Codex account">
          <div id="accountInitials" class="account-avatar">CD</div>
          <div>
            <strong id="accountName">Codex</strong>
            <span id="accountPlan">Codex</span>
          </div>
        </section>
      </aside>

      <section class="workspace">
        <header class="workspace-topbar" data-tauri-drag-region>
          <div data-tauri-drag-region>
            <p id="viewEyebrow" class="eyebrow" data-tauri-drag-region>Codex usage</p>
            <h1 id="viewTitle" data-tauri-drag-region>概览</h1>
          </div>
          <button id="refreshButton" class="icon-button" type="button" aria-label="刷新" title="刷新">
            <span aria-hidden="true">↻</span>
          </button>
        </header>

        <section id="errorPanel" class="error-panel" hidden></section>

        <section id="homeView">
          <div class="overview-meta">
            <span id="overviewSourceLabel">数据源</span>
            <strong id="overviewProvider">Codex</strong>
            <span id="overviewPeriod">近 30 天</span>
            <span id="overviewEstimateLabel">本地日志估算</span>
          </div>

          <section class="hero-metrics" aria-label="Featured usage summary">
            <article class="hero-metric">
              <span id="todayCostLabel">今日费用</span>
              <strong id="todayCost">-</strong>
            </article>
            <article class="hero-metric">
              <span id="periodCostLabel">近 30 天费用</span>
              <strong id="periodCost">-</strong>
              <small id="periodUsagePercent">-</small>
            </article>
            <article class="hero-metric">
              <span id="periodTokensLabel">近 30 天 token 用量</span>
              <strong id="periodTokens">-</strong>
            </article>
            <article class="hero-metric">
              <span id="latestTokenUsageLabel">最近 token 用量</span>
              <strong id="latestTokenUsage">-</strong>
            </article>
          </section>

          <section class="summary-grid" aria-label="Usage summary">
            <article class="metric">
              <span id="threadsTotalLabel">总会话</span>
              <strong id="threadsTotal">-</strong>
            </article>
            <article class="metric">
              <span id="threadsActiveLabel">活跃</span>
              <strong id="threadsActive">-</strong>
            </article>
            <article class="metric">
              <span id="tokensTotalLabel">总 token</span>
              <strong id="tokensTotal">-</strong>
            </article>
            <article class="metric">
              <span id="updatedThisWeekLabel">近 7 天更新</span>
              <strong id="updatedThisWeek">-</strong>
            </article>
          </section>

          <section class="content-grid">
            <article class="panel wide">
              <div class="panel-heading">
                <h2 id="activityTitle">近 30 天趋势</h2>
                <span id="lastUpdated">-</span>
              </div>
              <div class="chart-wrap">
                <div id="dailyChart" class="daily-chart"></div>
                <div id="chartTooltip" class="chart-tooltip" hidden></div>
              </div>
            </article>

            <article class="panel">
              <div class="panel-heading">
                <h2 id="rateLimitTitle">剩余用量</h2>
                <span id="rateLimitUpdated">-</span>
              </div>
              <div id="rateLimitList" class="limit-list"></div>
            </article>

            <article class="panel">
              <div class="panel-heading">
                <h2 id="modelTitle">模型</h2>
              </div>
              <div id="modelList" class="rank-list"></div>
            </article>

            <article class="panel">
              <div class="panel-heading">
                <h2 id="sourceTitle">运行来源</h2>
              </div>
              <div id="sourceList" class="rank-list"></div>
            </article>

            <article class="panel wide">
              <div class="panel-heading">
                <h2 id="workspaceTitle">工作区</h2>
              </div>
              <div id="workspaceList" class="rank-list columns"></div>
            </article>

            <article class="panel wide recent-panel">
              <div class="panel-heading">
                <h2 id="recentThreadsTitle">最近会话</h2>
              </div>
              <div id="recentThreads" class="thread-list"></div>
            </article>
          </section>
        </section>

        <section id="settingsView" class="settings-view" hidden>
          <article class="panel wide settings-panel">
            <div class="panel-heading">
              <h2 id="settingsPanelTitle">设置</h2>
              <span id="settingsStatus">-</span>
            </div>

            <div class="settings-list">
              <label class="setting-row">
                <span id="codexHomeLabel">Codex 数据目录</span>
                <div class="setting-control folder-control">
                  <code id="codexHomeValue">-</code>
                  <button id="chooseCodexHomeButton" class="secondary-button" type="button">选择目录</button>
                </div>
              </label>

              <label class="setting-row">
                <span id="claudeHomeLabel">Claude Code 数据目录</span>
                <div class="setting-control folder-control">
                  <code id="claudeHomeValue">-</code>
                  <button id="chooseClaudeHomeButton" class="secondary-button" type="button">选择目录</button>
                </div>
              </label>

              <label class="setting-row">
                <span id="languageLabel">语言</span>
                <select id="languageSelect">
                  <option id="languageAutoOption" value="auto">跟随系统</option>
                  <option id="languageZhOption" value="zh">中文</option>
                  <option id="languageEnOption" value="en">English</option>
                </select>
              </label>

              <label class="setting-row">
                <span id="themeLabel">主题</span>
                <select id="themeSelect">
                  <option id="themeSystemOption" value="system">跟随系统</option>
                  <option id="themeLightOption" value="light">浅色</option>
                  <option id="themeDarkOption" value="dark">深色</option>
                </select>
              </label>

              <label class="setting-row">
                <span id="accentLabel">主题色</span>
                <div id="accentOptions" class="accent-options" role="radiogroup" aria-label="主题色">
                  <button class="swatch" type="button" data-accent="blue" aria-label="Blue"></button>
                  <button class="swatch" type="button" data-accent="turquoise" aria-label="Turquoise"></button>
                  <button class="swatch" type="button" data-accent="green" aria-label="Green"></button>
                  <button class="swatch" type="button" data-accent="purple" aria-label="Purple"></button>
                  <button class="swatch" type="button" data-accent="red" aria-label="Red"></button>
                  <button class="swatch" type="button" data-accent="orange" aria-label="Orange"></button>
                  <button class="swatch" type="button" data-accent="graphite" aria-label="Graphite"></button>
                </div>
              </label>

              <label class="setting-row">
                <span id="chartPeriodLabel">图表周期</span>
                <div class="period-control">
                  <div id="periodPresets" class="period-presets" aria-label="图表周期快捷选择">
                    <button id="period7Button" type="button" data-days="7">一周</button>
                    <button id="period30Button" type="button" data-days="30">一个月</button>
                    <button id="period90Button" type="button" data-days="90">三个月</button>
                  </div>
                  <label class="days-input">
                    <input id="chartDaysInput" type="number" min="7" max="365" step="1" />
                    <span id="daysSuffix">天</span>
                  </label>
                </div>
              </label>
            </div>
          </article>
        </section>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
