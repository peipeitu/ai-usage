<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Usage Status</title>
    <link rel="stylesheet" href="./tray.css" />
  </head>
  <body>
    <main class="status-panel" aria-live="polite">
      <header class="status-header">
        <div class="provider-identity">
          <span class="provider-icon" aria-hidden="true">
            <img id="providerIcon" src="./assets/app-icon.svg" alt="" />
          </span>
          <div class="provider-copy">
            <strong id="providerName">AI Usage</strong>
            <span>AI Usage</span>
          </div>
        </div>
        <button id="openButton" class="open-button" type="button">打开详情</button>
      </header>

      <section class="usage-summary">
        <div class="usage-heading">
          <span id="usageLabel">剩余用量</span>
          <strong id="usageValue">--</strong>
        </div>
        <div id="usageTrack" class="usage-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuetext="暂无可用数据">
          <span id="usageFill" class="usage-fill"></span>
        </div>
        <p id="usageMeta">正在读取...</p>
      </section>
    </main>

    <script src="./tray.js"></script>
  </body>
</html>
